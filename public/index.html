<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureGate — Admin Panel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #1565C0;
      --primary-dark: #0D47A1;
      --primary-light: #E3F2FD;
      --accent: #F57C00;
      --success: #2E7D32;
      --success-light: #E8F5E9;
      --error: #C62828;
      --error-light: #FFEBEE;
      --sidebar-bg: #1A237E;
      --sidebar-text: rgba(255,255,255,0.75);
      --bg: #F0F4F8;
      --card-bg: #FFFFFF;
      --text: #1A237E;
      --text-body: #263238;
      --text-secondary: #607D8B;
      --border: #E0E0E0;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-body);
      min-height: 100vh;
    }

    /* ── LOGIN ─────────────────────────────────────────────────────────── */
    #login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1A237E 0%, #1565C0 100%);
    }
    .login-card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #1565C0, #1A237E);
      border-radius: 18px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 36px; margin-bottom: 14px;
    }
    .login-logo h1 { font-size: 26px; color: #1A237E; font-weight: 800; }
    .login-logo p { font-size: 13px; color: #607D8B; margin-top: 4px; }

    /* ── LAYOUT ────────────────────────────────────────────────────────── */
    #main-app { display: flex; min-height: 100vh; }

    #sidebar {
      width: 240px; min-height: 100vh;
      background: var(--sidebar-bg);
      position: fixed; top: 0; left: 0;
      display: flex; flex-direction: column; z-index: 100;
    }
    .sidebar-brand {
      padding: 22px 20px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .sidebar-brand h2 { color: white; font-size: 18px; font-weight: 800; }
    .sidebar-brand span { font-size: 11px; color: var(--sidebar-text); display: block; margin-top: 2px; }

    .sidebar-user {
      padding: 14px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .sidebar-user .u-name { color: white; font-size: 14px; font-weight: 600; }
    .sidebar-user .u-role {
      color: var(--sidebar-text); font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px;
    }

    .sidebar-nav { flex: 1; padding: 10px 0; }

    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 20px;
      color: var(--sidebar-text);
      cursor: pointer; font-size: 14px;
      border-left: 3px solid transparent;
      transition: all 0.2s;
    }
    .nav-item:hover { background: rgba(255,255,255,0.08); color: white; }
    .nav-item.active { background: rgba(255,255,255,0.13); color: white; border-left-color: var(--accent); }
    .nav-icon { font-size: 18px; width: 22px; text-align: center; }

    .sidebar-footer {
      padding: 14px 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    #page-wrap { margin-left: 240px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

    .page-header {
      background: white; padding: 20px 28px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .page-title { font-size: 20px; font-weight: 700; color: var(--text); }
    .page-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

    #page-content { padding: 24px 28px; flex: 1; }

    /* ── CARDS ─────────────────────────────────────────────────────────── */
    .card {
      background: white; border-radius: 16px;
      padding: 24px; box-shadow: var(--shadow);
    }
    .card-flush { padding: 0; overflow: hidden; }

    /* ── STATS ─────────────────────────────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 16px; margin-bottom: 24px;
    }
    .stat-card {
      background: white; border-radius: 16px;
      padding: 20px; box-shadow: var(--shadow);
    }
    .stat-value { font-size: 32px; font-weight: 800; color: var(--primary); }
    .stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

    /* ── TABLE ─────────────────────────────────────────────────────────── */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; gap: 12px; flex-wrap: wrap;
    }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; }

    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      text-align: left; padding: 11px 16px;
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-secondary);
      background: #F8FAFC; border-bottom: 1px solid var(--border);
    }
    .data-table td {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      font-size: 14px; vertical-align: middle;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tbody tr:hover td { background: #FAFBFF; }

    /* ── BADGES ────────────────────────────────────────────────────────── */
    .badge {
      display: inline-block; padding: 3px 10px;
      border-radius: 20px; font-size: 11px; font-weight: 700;
    }
    .badge-active   { background: var(--success-light); color: var(--success); }
    .badge-inactive { background: var(--error-light); color: var(--error); }
    .badge-host     { background: var(--primary-light); color: var(--primary); }
    .badge-guard    { background: #F3E5F5; color: #6A1B9A; }
    .badge-admin    { background: #FFF3E0; color: #E65100; }
    .badge-superAdmin { background: #FCE4EC; color: #AD1457; }

    /* ── BUTTONS ───────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px; border-radius: 10px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; border: none; transition: all 0.2s;
      font-family: inherit;
    }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover:not(:disabled) { background: var(--primary-dark); }
    .btn-danger { background: var(--error-light); color: var(--error); }
    .btn-danger:hover:not(:disabled) { background: #FFCDD2; }
    .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
    .btn-ghost:hover { background: #F5F5F5; }

    .icon-btn {
      padding: 6px; border-radius: 8px; background: transparent;
      border: none; cursor: pointer; font-size: 15px;
      transition: background 0.2s; line-height: 1;
    }
    .icon-btn:hover { background: #F0F0F0; }
    .icon-btn.del:hover { background: var(--error-light); }

    /* ── FORMS ─────────────────────────────────────────────────────────── */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .form-input {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 14px; outline: none; transition: border-color 0.2s;
      font-family: inherit; background: white; color: var(--text-body);
    }
    .form-input:focus { border-color: var(--primary); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-hint { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

    /* ── MODAL ─────────────────────────────────────────────────────────── */
    #modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; padding: 20px;
    }
    #modal-box {
      background: white; border-radius: 20px;
      width: 100%; max-width: 500px; max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 80px rgba(0,0,0,0.3);
    }
    .modal-head {
      padding: 20px 24px 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-head h3 { font-size: 18px; font-weight: 700; }
    .modal-body { padding: 20px 24px 24px; }
    .modal-actions {
      display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px;
    }

    /* ── TOAST ─────────────────────────────────────────────────────────── */
    #toasts {
      position: fixed; bottom: 24px; right: 24px; z-index: 2000;
      display: flex; flex-direction: column; gap: 8px;
    }
    .toast {
      padding: 12px 20px; border-radius: 12px;
      font-size: 14px; font-weight: 500; color: white;
      animation: slideIn 0.25s ease; max-width: 320px;
    }
    .toast-ok  { background: var(--success); }
    .toast-err { background: var(--error); }
    @keyframes slideIn { from { transform: translateX(60px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* ── EMPTY / LOADING ───────────────────────────────────────────────── */
    .empty {
      text-align: center; padding: 60px 20px; color: var(--text-secondary);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--primary-light); border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 48px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── AVATAR ────────────────────────────────────────────────────────── */
    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--primary-light); color: var(--primary);
      font-weight: 700; font-size: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .user-cell { display: flex; align-items: center; gap: 10px; }
    .user-cell .n { font-weight: 600; font-size: 14px; }
    .user-cell .e { font-size: 12px; color: var(--text-secondary); }

    /* ── CONFIRM ───────────────────────────────────────────────────────── */
    .confirm-body { text-align: center; padding: 8px 0; }
    .confirm-icon { font-size: 52px; margin-bottom: 14px; }
    .confirm-msg { font-size: 15px; color: var(--text-secondary); line-height: 1.6; }

    /* ── RESPONSIVE ────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      #sidebar { width: 200px; }
      #page-wrap { margin-left: 200px; }
      .form-row { grid-template-columns: 1fr; }
      #page-content { padding: 16px; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-icon">🛡️</div>
      <h1>SecureGate</h1>
      <p>Admin Management Panel</p>
    </div>
    <div id="login-err" style="display:none; background:var(--error-light); color:var(--error); padding:10px 14px; border-radius:10px; font-size:13px; margin-bottom:16px;"></div>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" id="l-email" class="form-input" placeholder="admin@example.com">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="l-pass" class="form-input" placeholder="••••••••">
    </div>
    <button class="btn btn-primary" id="l-btn" style="width:100%;justify-content:center;padding:12px;" onclick="doLogin()">
      Sign In
    </button>
  </div>
</div>

<!-- APP -->
<div id="main-app" style="display:none">
  <nav id="sidebar">
    <div class="sidebar-brand">
      <h2>🛡️ SecureGate</h2>
      <span>Management Panel</span>
    </div>
    <div class="sidebar-user">
      <div class="u-name" id="sb-name">—</div>
      <div class="u-role" id="sb-role">—</div>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
    <div class="sidebar-footer">
      <div class="nav-item" onclick="doLogout()">
        <span class="nav-icon">🚪</span><span>Logout</span>
      </div>
    </div>
  </nav>

  <div id="page-wrap">
    <div class="page-header">
      <div>
        <div class="page-title" id="pg-title">Dashboard</div>
        <div class="page-subtitle" id="pg-sub">Overview</div>
      </div>
      <div id="pg-actions"></div>
    </div>
    <div id="page-content"><div class="spinner"></div></div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay" style="display:none" onclick="onOverlayClick(event)">
  <div id="modal-box">
    <div class="modal-head">
      <h3 id="modal-title"></h3>
      <button class="icon-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- TOASTS -->
<div id="toasts"></div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const API = '/api';
const ROLE_LABELS = { guard:'Guard', host:'Host', admin:'Admin', superAdmin:'Super Admin' };

// ── State ────────────────────────────────────────────────────────────────────
let token = localStorage.getItem('sg_token');
let me = null;
try { me = JSON.parse(localStorage.getItem('sg_user') || 'null'); } catch {}

// ── HTTP ─────────────────────────────────────────────────────────────────────
async function http(method, path, body) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(API + path, {
    method,
    headers,
    body: body != null ? JSON.stringify(body) : undefined,
  });
  const json = await res.json();
  if (!res.ok) throw new Error(json.message || 'Request failed');
  return json;
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, type) {
  const el = document.createElement('div');
  el.className = 'toast ' + (type === 'err' ? 'toast-err' : 'toast-ok');
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(title, html) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').style.display = 'flex';
}
function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
function onOverlayClick(e) { if (e.target.id === 'modal-overlay') closeModal(); }

// ── Helpers ───────────────────────────────────────────────────────────────────
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const val = id => (document.getElementById(id)?.value || '').trim();
const initials = n => (n||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
function setContent(html) { document.getElementById('page-content').innerHTML = html; }
function setActions(html) { document.getElementById('pg-actions').innerHTML = html; }

function roleBadge(role) {
  return `<span class="badge badge-${role}">${esc(ROLE_LABELS[role] || role)}</span>`;
}

// ── Auth ──────────────────────────────────────────────────────────────────────
async function doLogin() {
  const email = val('l-email'), pass = document.getElementById('l-pass').value;
  const btn = document.getElementById('l-btn'), errEl = document.getElementById('login-err');
  errEl.style.display = 'none';
  if (!email || !pass) { errEl.textContent = 'Enter email and password'; errEl.style.display = 'block'; return; }
  btn.textContent = 'Signing in…'; btn.disabled = true;
  try {
    const data = await http('POST', '/auth/login', { email, password: pass });
    if (!['admin','superAdmin'].includes(data.user.role)) throw new Error('Only admin and superAdmin can access this panel');
    token = data.token; me = data.user;
    localStorage.setItem('sg_token', token);
    localStorage.setItem('sg_user', JSON.stringify(me));
    bootApp();
  } catch(e) {
    errEl.textContent = e.message; errEl.style.display = 'block';
  } finally { btn.textContent = 'Sign In'; btn.disabled = false; }
}

function doLogout() {
  token = null; me = null;
  localStorage.removeItem('sg_token'); localStorage.removeItem('sg_user');
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
  document.getElementById('l-pass').value = '';
}

// ── App Shell ─────────────────────────────────────────────────────────────────
function bootApp() {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('main-app').style.display = 'flex';
  document.getElementById('sb-name').textContent = me.name;
  document.getElementById('sb-role').textContent = ROLE_LABELS[me.role] || me.role;

  const nav = [
    { id:'dashboard', icon:'📊', label:'Dashboard' },
    ...(me.role === 'superAdmin' ? [{ id:'companies', icon:'🏢', label:'Companies' }] : []),
    { id:'users', icon:'👥', label:'Users' },
  ];
  document.getElementById('sidebar-nav').innerHTML = nav.map(n =>
    `<div class="nav-item" id="nav-${n.id}" onclick="go('${n.id}')">
       <span class="nav-icon">${n.icon}</span><span>${n.label}</span>
     </div>`
  ).join('');
  go('dashboard');
}

function go(page) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('nav-' + page);
  if (el) el.classList.add('active');
  const titles = { dashboard:['Dashboard','Overview'], companies:['Companies','Manage companies'], users:['Users','Manage users and access'] };
  const [t,s] = titles[page] || [page,''];
  document.getElementById('pg-title').textContent = t;
  document.getElementById('pg-sub').textContent = s;
  setActions('');
  if (page === 'dashboard') pageDashboard();
  else if (page === 'companies') pageCompanies();
  else if (page === 'users') pageUsers();
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
async function pageDashboard() {
  setContent('<div class="spinner"></div>');
  try {
    const qs = (me.role === 'admin' && me.companyIds?.[0]) ? '?companyId=' + me.companyIds[0] : '';
    const [ld, sd] = await Promise.all([http('GET','/dashboard/live'+qs), http('GET','/dashboard/stats'+qs)]);
    const live = ld.data || {}, stats = sd.stats || {};

    setContent(`
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-value">${live.currentlyInside??0}</div><div class="stat-label">🟢 Inside Now</div></div>
        <div class="stat-card"><div class="stat-value">${live.pendingApproval??0}</div><div class="stat-label">⏳ Pending</div></div>
        <div class="stat-card"><div class="stat-value">${live.todayTotal??0}</div><div class="stat-label">📅 Today</div></div>
        <div class="stat-card"><div class="stat-value">${stats.weekVisitors??0}</div><div class="stat-label">📆 This Week</div></div>
        <div class="stat-card"><div class="stat-value">${stats.totalVisitors??0}</div><div class="stat-label">👥 All Time</div></div>
      </div>
      ${visitorSection('⏳ Pending Approvals', live.pending || [])}
      ${visitorSection('🟢 Currently Inside', live.approved || [], true)}
    `);
  } catch(e) { setContent(`<div class="empty"><div class="empty-icon">⚠️</div><p>${esc(e.message)}</p></div>`); }
}

function visitorSection(title, list, mt) {
  if (!list.length) return '';
  return `<div class="card${mt?' style=\"margin-top:16px\"':''}" style="padding:0;overflow:hidden;${mt?'':'margin-top:0'}">
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);font-weight:700">${title}</div>
    <table class="data-table">
      <thead><tr><th>Visitor</th><th>Host</th><th>Purpose</th><th>Time</th></tr></thead>
      <tbody>${list.map(v=>`<tr>
        <td>${esc(v.visitorName)}</td>
        <td>${esc(v.hostName||'—')}</td>
        <td>${esc(v.purpose||'—')}</td>
        <td>${new Date(v.checkInTime).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</td>
      </tr>`).join('')}</tbody>
    </table>
  </div>`;
}

// ── Companies ─────────────────────────────────────────────────────────────────
let _cos = [];

async function pageCompanies() {
  setActions(`<button class="btn btn-primary" onclick="addCompany()">+ Add Company</button>`);
  setContent('<div class="spinner"></div>');
  try {
    _cos = (await http('GET','/companies')).companies || [];
    renderCos();
  } catch(e) { setContent(`<div class="empty"><div class="empty-icon">⚠️</div><p>${esc(e.message)}</p></div>`); }
}

function renderCos() {
  if (!_cos.length) { setContent(`<div class="empty"><div class="empty-icon">🏢</div><p>No companies yet.</p></div>`); return; }
  setContent(`<div class="card card-flush">
    <table class="data-table">
      <thead><tr><th>Company</th><th>Contact</th><th>Status</th><th style="width:100px">Actions</th></tr></thead>
      <tbody>${_cos.map(c=>`<tr>
        <td><div style="font-weight:600">${esc(c.name)}</div><div style="font-size:12px;color:var(--text-secondary)">${esc(c.address||'—')}</div></td>
        <td><div>${esc(c.email||'—')}</div><div style="font-size:12px;color:var(--text-secondary)">${esc(c.phone||'—')}</div></td>
        <td><span class="badge ${c.isActive?'badge-active':'badge-inactive'}">${c.isActive?'Active':'Inactive'}</span></td>
        <td>
          <button class="icon-btn" title="Edit" onclick="editCompany('${c.id}')">✏️</button>
          <button class="icon-btn" title="${c.isActive?'Deactivate':'Activate'}" onclick="toggleCo('${c.id}',${!c.isActive})">${c.isActive?'🚫':'✅'}</button>
        </td>
      </tr>`).join('')}</tbody>
    </table>
  </div>`);
}

function addCompany() {
  openModal('Add Company', `
    <div class="form-group"><label class="form-label">Company Name *</label><input id="fc-n" class="form-input" placeholder="Acme Corp"></div>
    <div class="form-group"><label class="form-label">Address *</label><input id="fc-a" class="form-input" placeholder="123 Main St, City"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Phone</label><input id="fc-p" class="form-input" type="tel" placeholder="+91 98765 43210"></div>
      <div class="form-group"><label class="form-label">Email</label><input id="fc-e" class="form-input" type="email" placeholder="info@company.com"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitAddCo()">Create</button>
    </div>`);
}

async function submitAddCo() {
  const n=val('fc-n'), a=val('fc-a');
  if (!n||!a) { toast('Name and address required','err'); return; }
  try {
    const d = await http('POST','/companies',{name:n,address:a,phone:val('fc-p')||undefined,email:val('fc-e')||undefined});
    _cos.unshift(d.company); renderCos(); closeModal(); toast('Company created');
  } catch(e) { toast(e.message,'err'); }
}

function editCompany(id) {
  const c = _cos.find(x=>x.id===id); if (!c) return;
  openModal('Edit Company', `
    <div class="form-group"><label class="form-label">Company Name *</label><input id="ec-n" class="form-input" value="${esc(c.name)}"></div>
    <div class="form-group"><label class="form-label">Address *</label><input id="ec-a" class="form-input" value="${esc(c.address||'')}"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Phone</label><input id="ec-p" class="form-input" type="tel" value="${esc(c.phone||'')}"></div>
      <div class="form-group"><label class="form-label">Email</label><input id="ec-e" class="form-input" type="email" value="${esc(c.email||'')}"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitEditCo('${id}')">Save</button>
    </div>`);
}

async function submitEditCo(id) {
  const n=val('ec-n'), a=val('ec-a');
  if (!n||!a) { toast('Name and address required','err'); return; }
  try {
    const d = await http('PATCH',`/companies/${id}`,{name:n,address:a,phone:val('ec-p')||null,email:val('ec-e')||null});
    const i = _cos.findIndex(x=>x.id===id); if(i>=0) _cos[i]=d.company;
    renderCos(); closeModal(); toast('Company updated');
  } catch(e) { toast(e.message,'err'); }
}

async function toggleCo(id, active) {
  try {
    const d = await http('PATCH',`/companies/${id}`,{isActive:active});
    const i = _cos.findIndex(x=>x.id===id); if(i>=0) _cos[i]=d.company;
    renderCos(); toast('Company '+(active?'activated':'deactivated'));
  } catch(e) { toast(e.message,'err'); }
}

// ── Users ─────────────────────────────────────────────────────────────────────
let _users = [], _allCos = [], _roleFilter = '';

async function pageUsers() {
  setActions(`<button class="btn btn-primary" onclick="addUser()">+ Add User</button>`);
  setContent('<div class="spinner"></div>');
  try {
    if (me.role === 'superAdmin') {
      _allCos = (await http('GET','/companies')).companies || [];
    }
    _users = (await http('GET','/users')).users || [];
    renderUsers();
  } catch(e) { setContent(`<div class="empty"><div class="empty-icon">⚠️</div><p>${esc(e.message)}</p></div>`); }
}

function renderUsers() {
  const filtered = _roleFilter ? _users.filter(u=>u.role===_roleFilter) : _users;
  const roleOpts = ['','host','guard','admin','superAdmin'].map(r =>
    `<option value="${r}" ${_roleFilter===r?'selected':''}>${r?ROLE_LABELS[r]||r:'All Roles'}</option>`
  ).join('');

  const tableHtml = !filtered.length
    ? `<div class="empty"><div class="empty-icon">👤</div><p>No users found</p></div>`
    : `<table class="data-table">
        <thead><tr><th>User</th><th>Phone</th><th>Role</th><th>Status</th><th style="width:120px">Actions</th></tr></thead>
        <tbody>${filtered.map(u=>`<tr>
          <td><div class="user-cell">
            <div class="avatar">${esc(initials(u.name))}</div>
            <div><div class="n">${esc(u.name)}</div><div class="e">${esc(u.email)}</div></div>
          </div></td>
          <td>${esc(u.phone||'—')}</td>
          <td>${roleBadge(u.role)}</td>
          <td><span class="badge ${u.isActive?'badge-active':'badge-inactive'}">${u.isActive?'Active':'Inactive'}</span></td>
          <td>
            <button class="icon-btn" title="Edit" onclick="editUser('${u.id}')">✏️</button>
            <button class="icon-btn" title="Change Password" onclick="changePass('${u.id}')">🔑</button>
            <button class="icon-btn del" title="Delete" onclick="confirmDelete('${u.id}','${esc(u.name)}')">🗑️</button>
          </td>
        </tr>`).join('')}</tbody>
      </table>`;

  setContent(`
    <div class="toolbar">
      <div class="filters">
        <select class="form-input" style="width:auto;padding:8px 14px;font-size:13px"
          onchange="_roleFilter=this.value;renderUsers()">${roleOpts}</select>
      </div>
      <span style="font-size:13px;color:var(--text-secondary)">${filtered.length} user${filtered.length!==1?'s':''}</span>
    </div>
    <div class="card card-flush">${tableHtml}</div>`);
}

async function addUser() {
  let coHtml = '';
  if (me.role === 'superAdmin' && _allCos.length) {
    coHtml = `<div class="form-group"><label class="form-label">Assign to Company</label>
      <select id="au-co" class="form-input">
        <option value="">None</option>
        ${_allCos.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')}
      </select></div>`;
  }
  const roleOpts = me.role === 'superAdmin'
    ? `<option value="host">Host</option><option value="guard">Guard</option><option value="admin">Admin</option>`
    : `<option value="host">Host</option>`;

  openModal('Add User', `
    <div class="form-row">
      <div class="form-group"><label class="form-label">Full Name *</label><input id="au-n" class="form-input" placeholder="John Doe"></div>
      <div class="form-group"><label class="form-label">Phone *</label><input id="au-ph" class="form-input" type="tel" placeholder="+91 98765 43210"></div>
    </div>
    <div class="form-group"><label class="form-label">Email *</label><input id="au-em" class="form-input" type="email" placeholder="john@example.com"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Password *</label><input id="au-pw" class="form-input" type="password" placeholder="Min 6 chars"></div>
      <div class="form-group"><label class="form-label">Role *</label><select id="au-ro" class="form-input">${roleOpts}</select></div>
    </div>
    ${coHtml}
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitAddUser()">Create User</button>
    </div>`);
}

async function submitAddUser() {
  const n=val('au-n'),ph=val('au-ph'),em=val('au-em'),pw=val('au-pw'),ro=val('au-ro');
  const coEl=document.getElementById('au-co'), coId=coEl?coEl.value:'';
  if (!n||!ph||!em||!pw) { toast('All required fields must be filled','err'); return; }
  if (pw.length<6) { toast('Password must be at least 6 characters','err'); return; }
  const body={name:n,phone:ph,email:em,password:pw,role:ro};
  if (coId) body.companyIds=[coId];
  try {
    const d=await http('POST','/users',body);
    _users.unshift(d.user); renderUsers(); closeModal(); toast('User created');
  } catch(e) { toast(e.message,'err'); }
}

function editUser(id) {
  const u=_users.find(x=>x.id===id); if(!u) return;
  openModal(`Edit — ${esc(u.name)}`, `
    <div class="form-row">
      <div class="form-group"><label class="form-label">Full Name *</label><input id="eu-n" class="form-input" value="${esc(u.name)}"></div>
      <div class="form-group"><label class="form-label">Phone *</label><input id="eu-ph" class="form-input" type="tel" value="${esc(u.phone||'')}"></div>
    </div>
    <div class="form-group"><label class="form-label">Status</label>
      <select id="eu-ac" class="form-input">
        <option value="true" ${u.isActive?'selected':''}>Active</option>
        <option value="false" ${!u.isActive?'selected':''}>Inactive (blocked from login)</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitEditUser('${id}')">Save Changes</button>
    </div>`);
}

async function submitEditUser(id) {
  const n=val('eu-n'),ph=val('eu-ph');
  const isActive=document.getElementById('eu-ac').value==='true';
  if (!n||!ph) { toast('Name and phone required','err'); return; }
  try {
    const d=await http('PATCH',`/users/${id}`,{name:n,phone:ph,isActive});
    const i=_users.findIndex(x=>x.id===id); if(i>=0) _users[i]=d.user;
    renderUsers(); closeModal(); toast('User updated');
  } catch(e) { toast(e.message,'err'); }
}

function changePass(id) {
  const u=_users.find(x=>x.id===id); if(!u) return;
  openModal(`Change Password — ${esc(u.name)}`, `
    <div class="form-group"><label class="form-label">New Password *</label>
      <input id="cp-p" class="form-input" type="password" placeholder="Min 6 characters">
      <div class="form-hint">The user will need to use this new password on their next login.</div>
    </div>
    <div class="form-group"><label class="form-label">Confirm Password *</label>
      <input id="cp-c" class="form-input" type="password" placeholder="Repeat password">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitChangePass('${id}')">Update Password</button>
    </div>`);
}

async function submitChangePass(id) {
  const p=document.getElementById('cp-p').value, c=document.getElementById('cp-c').value;
  if (!p) { toast('Password is required','err'); return; }
  if (p.length<6) { toast('Password must be at least 6 characters','err'); return; }
  if (p!==c) { toast('Passwords do not match','err'); return; }
  try {
    await http('PATCH',`/users/${id}`,{password:p});
    closeModal(); toast('Password updated');
  } catch(e) { toast(e.message,'err'); }
}

function confirmDelete(id, name) {
  openModal('Delete User', `
    <div class="confirm-body">
      <div class="confirm-icon">🗑️</div>
      <p class="confirm-msg">Delete <strong>${esc(name)}</strong>?<br>This cannot be undone. All company assignments will be removed.</p>
      <div class="modal-actions" style="justify-content:center;margin-top:24px">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-danger" onclick="submitDelete('${id}')">Yes, Delete</button>
      </div>
    </div>`);
}

async function submitDelete(id) {
  try {
    await http('DELETE',`/users/${id}`);
    _users=_users.filter(u=>u.id!==id);
    renderUsers(); closeModal(); toast('User deleted');
  } catch(e) { toast(e.message,'err'); }
}

// ── Enter key on login ────────────────────────────────────────────────────────
document.getElementById('l-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('l-email').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('l-pass').focus(); });

// ── Init ──────────────────────────────────────────────────────────────────────
if (token && me && ['admin','superAdmin'].includes(me.role)) {
  bootApp();
} else {
  document.getElementById('login-page').style.display = 'flex';
}
</script>
</body>
</html>
